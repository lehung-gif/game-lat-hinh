<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game 6x6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Memory Game (Thử thách 120s)</h1>
    <h2 id="timer">Thời gian: 120s</h2>
    <p id="wrong-count" style="color: #ff7675;">Sai liên tiếp: 0/5</p>
    <p id="instruction">Bạn có 20 giây để ghi nhớ!</p>
    <div id="game-board" class="grid"></div>
    <button onclick="resetGame()">Chơi Lại</button>
</div>
    <script src="script.js"></script>
</body>
</html>
